embedding_model:
  google:
    provider: "google"
    model_name: "models/text-embedding-004"

  huggingface:
    provider: "huggingface"
    model_name: "sentence-transformers/all-MiniLM-L6-v2"
    # Alternative models:
    # model_name: "BAAI/bge-small-en-v1.5"
    # model_name: "BAAI/bge-base-en-v1.5"
    # model_name: "intfloat/e5-base-v2"

retriever:
  top_k: 10
  search_type: "mmr"  # Options: "similarity", "mmr", "similarity_score_threshold"

  # MMR (Maximal Marginal Relevance) parameters
  fetch_k: 20          # Should be greater than top_k
  lambda_mult: 0.5     # 0 = maximum diversity, 1 = maximum relevance

llm:
  groq:
    provider: "groq"
    model_name: "openai/gpt-oss-20b"
    temperature: 0
    max_output_tokens: 2048

  google:
    provider: "google"
    model_name: "gemini-2.0-flash"
    temperature: 0
    max_output_tokens: 2048