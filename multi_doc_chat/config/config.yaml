embedding_model:
  # Embedding models
  google:
    provider: "google"
    model_name: "models/text-embedding-004"

  huggingface:
    provider: "huggingface"
    model_name: "sentence-transformers/all-MiniLM-L6-v2"
    # Other models: BAAI/bge-small-en-v1.5, intfloat/e5-base-v2

retriever:
  top_k: 10                     # Number of documents to retrieve
  search_type: "mmr"            # similarity | mmr | similarity_score_threshold
  fetch_k: 20                   # Documents fetched before MMR
  lambda_mult: 0.5              # 0 = more diversity, 1 = more relevance

llm:
  groq:
    provider: "groq"
    model_name: "openai/gpt-oss-20b"
    temperature: 0              # Lower = more deterministic
    max_output_tokens: 2048     # Maximum response length

  google:
    provider: "google"
    model_name: "gemini-2.0-flash"
    temperature: 0
    max_output_tokens: 2048